<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        // This script handles 404s by redirecting to the base URL with the path as a query parameter
        const path = window.location.pathname;
        window.location.replace('/?redirect=' + path);
    </script>
</head>
<body>
</body>
</html>
